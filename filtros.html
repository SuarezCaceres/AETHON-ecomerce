<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo</title>

    <!-- Estilos principales -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">

    <!-- navbar reutilizable -->
    <link href="css/navbar.css" rel="stylesheet">

    <!-- estilos del footer -->
    <link href="css/footer.css" rel="stylesheet">

    <!-- estilos de filtros -->
    <link href="css/filtros.css" rel="stylesheet">

</head>

<body>
    <!-- Barra de navegación -->
    <div id="navbar-placeholder"></div>


    <div class="container">

        <div class="banner">
            <h1>Catálogo de Productos</h1>
            <p>Encuentra los mejores libros para lo que necesites!</p>
        </div>

        <div class="layout">


            <div class="filters">
                <h3>Filtros</h3>

                <label>Género</label>
                <select id="genero">
                    <option>Seleccione género</option>
                    <option>Universitarios</option>
                    <option>Escolares</option>
                    <option>Arquitectura y Diseño</option>
                    <option>Literatura</option>
                    <option>Infantil</option>
                    <option>Idiomas</option>
                    <option>Tecnología</option>
                    <option>Ciencias</option>
                    <option>Arte</option>
                    <option>Material educativo</option>
                </select>

                <label>Etiqueta</label>
                <select id="etiqueta">
                    <option>Seleccione etiqueta</option>
                    <option>cálculo</option>
                    <option>maquetas</option>
                    <option>rápido</option>
                    <option>económico</option>
                    <option>plan lector</option>
                    <option>universitario</option>
                    <option>ingeniería</option>
                </select>

                <label>Precio</label>
                <select id="precio">
                    <option>Seleccione</option>
                    <option>0 - 50</option>
                    <option>50 - 100</option>
                    <option>100 - 200</option>
                    <option>200+</option>
                </select>

                <label>Autor</label>
                <select id="autor">
                    <option>Seleccione autor</option>
                    <option>Lovecraft</option>
                    <option>Cuttlefish</option>
                    <option>Autor 1</option>
                    <option>Autor 2</option>
                </select>

                <button onclick="limpiarFiltros()">Limpiar filtros</button>
            </div>


            <div class="catalog">
                
                <div class="top-bar">
                    <input type="text" id="search" placeholder="Search...">
                    <select id="orden">
                        <option value="">Ordenar por</option>
                        <option value="precio-asc">Precio menor a mayor</option>
                        <option value="precio-desc">Precio mayor a menor</option>
                        <option value="az">A - Z</option>
                    </select>
                </div>

                <p id="contador"></p>

                <div class="grid" id="grid"></div>
                <h3 class="recomendados-titulo">Libros que te pueden gustar</h3>
                <div class="recomendados" id="recomendados"></div>

            </div>

        </div>
    </div>
  <!-- Footer -->
<div id="footer-placeholder"></div>

<!-- Scripts -->
<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/filtros.js"></script>

<script>
function loadComponent(url, elementId, callback) {
    fetch(url)
        .then(r => r.text())
        .then(html => {
            document.getElementById(elementId).innerHTML = html;
            if (callback) callback();
        })
        .catch(err => console.error('Error cargando ' + url + ':', err));
}

document.addEventListener('DOMContentLoaded', function () {
    loadComponent('navbar.html', 'navbar-placeholder');
    loadComponent('footer.html', 'footer-placeholder');
});
</script>

</body>
</html>
