<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AETHON</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Estilos principales -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/blogInformacion.css">

    <!-- se agrega la navbar de bootstrap para reutilización en otras páginas -->
    <link href="css/navbar.css" rel="stylesheet">

    <!-- se agrega el carrusel de bootstrap para reutilización en otras páginas -->
    <link href="css/carousel.css" rel="stylesheet">

    <!-- estilos del footer -->
    <link href="css/footer.css" rel="stylesheet">
</head>

<body>

    <!-- Barra de navegación incluida desde navbar.html -->
    <div id="navbar-placeholder"></div>


    <!-- contenido principal -->
    <main class="main-content">

        

    </main>

    <!-- Footer incluido desde footer.html -->
    <div id="footer-placeholder"></div>

    <!-- Script para incluir componentes HTML separados -->
    <script>
        // Función para cargar HTML parcial en un elemento
        function loadComponent(url, elementId) {
            fetch(url)
                .then(response => response.text())
                .then(data => {
                    document.getElementById(elementId).innerHTML = data;
                })
                .catch(error => console.error('Error cargando ' + url + ':', error));
        }

        // Cargar componentes al iniciar la página
        document.addEventListener('DOMContentLoaded', function() {
            // se enlazan los HTML con sus contenedores
            loadComponent('navbar.html', 'navbar-placeholder');
            loadComponent('carousel.html', 'carousel-placeholder');
            loadComponent('footer.html', 'footer-placeholder'); 
        });
    </script>

</body>
</html>
